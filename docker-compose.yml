services:
  mealplanner:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - mealplanner-data:/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/mealplanner.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/login').read()"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  mealplanner-data:
